<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>M&E · Dashboards</title>

<style>
:root{
  --bg:#0f172a;
  --burgundy:#7a0026;
}

*{
  box-sizing:border-box;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(135deg,#0f172a,#1e293b);
}

/* ================= HEADER ================= */

.main-header{
  padding:20px 28px 22px;
  color:#fff;
  background:linear-gradient(90deg,#7a0026,#a00035);
  box-shadow:0 6px 20px rgba(0,0,0,.35);
  position:sticky;
  top:0;
  z-index:9999;
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
  gap:14px;
}

.back-link{
  text-decoration:none;
  background:#ffffff;
  color:var(--burgundy);
  font-weight:700;
  font-size:12px;
  padding:7px 14px;
  border-radius:20px;
  transition:.2s ease;
  white-space:nowrap;
  box-shadow:0 6px 14px rgba(0,0,0,.22);
}
.back-link:hover{
  background:#f3f4f6;
  transform:translateY(-1px);
  box-shadow:0 10px 20px rgba(0,0,0,.28);
}

.header-top h1{
  margin:0;
  font-size:20px;
  font-weight:800;
  letter-spacing:.5px;
  flex:1;
  text-align:center;
}

.header-year{
  font-size:13px;
  font-weight:700;
  background:rgba(255,255,255,.2);
  padding:6px 14px;
  border-radius:20px;
  white-space:nowrap;
}

/* ================= NAVIGATION ================= */

.header-tabs{
  max-width:1600px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:12px;
}

/* Tab container */
.header-tab{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;

  padding:14px 10px;
  border-radius:14px;
  cursor:pointer;

  font-size:13px;
  font-weight:700;
  letter-spacing:.2px;
  color:#fff;

  transition:.2s ease;
  box-shadow:0 8px 18px rgba(0,0,0,.3);

  text-align:center;
  min-height:64px;
}

.header-tab:hover{
  transform:translateY(-2px);
  box-shadow:0 14px 30px rgba(0,0,0,.4);
}

.header-tab.active{
  outline:3px solid #fff;
  transform:scale(1.02);
}

/* Wrap text cleanly (max 2 lines) */
.lbl{
  display:-webkit-box;
  -webkit-box-orient:vertical;
  -webkit-line-clamp:2;
  overflow:hidden;
  line-height:1.15;
}

/* Icon styling */
.ico{
  flex:0 0 auto;
  font-size:16px;
}

/* Tab colours */
.tab-topline{background:linear-gradient(135deg,#dc2626,#b91c1c);}
.tab-subopt{background:linear-gradient(135deg,#f59e0b,#d97706);}
.tab-pmp{background:linear-gradient(135deg,#9333ea,#7e22ce);}
.tab-superv{background:linear-gradient(135deg,#059669,#047857);}
.tab-dqa{background:linear-gradient(135deg,#2563eb,#1d4ed8);}

/* ================= DASHBOARD ================= */

.frame-wrap{
  flex:1;
  min-height:0;
  padding:20px;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  overflow:hidden;
}

.aspect-ratio-box{
  width:100%;
  max-width:1600px;
  aspect-ratio:16 / 9;
  overflow:hidden;
  border-radius:18px;
  background:#fff;
  box-shadow:0 18px 45px rgba(0,0,0,.45);
}

.aspect-ratio-box iframe{
  width:100%;
  height:100%;
  border:0;
  background:#fff;
  display:block;
}
</style>
</head>

<body>

<header class="main-header">
  <div class="header-top">
    <a class="back-link" href="../../index.html">← Master Dashboard</a>
    <h1>Monitoring &amp; Evaluation (M&amp;E)</h1>
    <span class="header-year">FY2026</span>
  </div>

  <div class="header-tabs" role="tablist" aria-label="M&E dashboards">

    <!-- Order: Topline, Suboptimal, PMP, Supervision, DQA -->

    <div class="header-tab tab-topline active"
         data-src="./topline_indicator_performance.html"
         data-hash="topline">
      <span class="ico">📈</span>
      <span class="lbl">Topline Indicator Performance Overview</span>
    </div>

    <div class="header-tab tab-subopt"
         data-src="./suboptimal_indicator_tracking.html"
         data-hash="suboptimal">
      <span class="ico">⚠</span>
      <span class="lbl">Suboptimal Indicator Tracking & Follow-up</span>
    </div>

    <div class="header-tab tab-pmp"
         data-src="./pmp.html"
         data-hash="pmp">
      <span class="ico">📋</span>
      <span class="lbl">Performance Monitoring Plan (PMP)</span>
    </div>

    <div class="header-tab tab-superv"
         data-src="./supervision_report.html"
         data-hash="supervision">
      <span class="ico">🧭</span>
      <span class="lbl">Supportive Supervision Reports</span>
    </div>

    <div class="header-tab tab-dqa"
         data-src="./dqa_report.html"
         data-hash="dqa">
      <span class="ico">✅</span>
      <span class="lbl">Data Quality Assessment (DQA)</span>
    </div>

  </div>
</header>

<main class="frame-wrap">
  <div class="aspect-ratio-box">
    <iframe id="frame"
            src="./topline_indicator_performance.html"
            title="M&E dashboard"></iframe>
  </div>
</main>

<script>
const frame = document.getElementById("frame");
const tabs  = [...document.querySelectorAll(".header-tab")];

function activate(tab){
  tabs.forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  frame.src = tab.dataset.src;

  if(tab.dataset.hash){
    history.replaceState(null, "", "#" + tab.dataset.hash);
  }
}

tabs.forEach(tab => tab.addEventListener("click", () => activate(tab)));

const hash = location.hash.replace("#","").trim();
if(hash){
  const match = tabs.find(t => t.dataset.hash === hash);
  if(match) activate(match);
}
</script>

</body>
</html>
