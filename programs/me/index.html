<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>M&E · Dashboards</title>

<style>
:root{
  --bg:#0f172a;
  --burgundy:#7a0026;
}

*{ box-sizing:border-box; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; }

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(135deg,#0f172a,#1e293b);
}

/* HEADER stays above everything */
.main-header{
  padding:20px 28px 22px;
  color:#fff;
  background:linear-gradient(90deg,#7a0026,#a00035);
  box-shadow:0 6px 20px rgba(0,0,0,.35);
  position:sticky;
  top:0;
  z-index:9999;
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
  gap:14px;
}

.back-link{
  text-decoration:none;
  background:#ffffff;
  color:var(--burgundy);
  font-weight:700;
  font-size:12px;
  padding:7px 14px;
  border-radius:20px;
  transition:.2s ease;
  white-space:nowrap;
  box-shadow:0 6px 14px rgba(0,0,0,.22);
}
.back-link:hover{
  background:#f3f4f6;
  transform:translateY(-1px);
  box-shadow:0 10px 20px rgba(0,0,0,.28);
}

.header-top h1{
  margin:0;
  font-size:20px;
  font-weight:800;
  letter-spacing:.5px;
  flex:1;
  text-align:center;
}

.header-year{
  font-size:13px;
  font-weight:700;
  background:rgba(255,255,255,.2);
  padding:6px 14px;
  border-radius:20px;
  white-space:nowrap;
}

/* NAV */
.header-tabs{
  max-width:1600px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:10px;
}

/* One-line tabs with ellipsis */
.header-tab{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;

  padding:12px 10px;
  border-radius:12px;
  cursor:pointer;

  font-size:13px;
  font-weight:750;
  letter-spacing:.2px;
  color:#fff;

  transition:.2s ease;
  box-shadow:0 6px 16px rgba(0,0,0,.25);

  /* Force single line */
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.header-tab:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 24px rgba(0,0,0,.4);
}
.header-tab.active{
  outline:3px solid #fff;
  transform:scale(1.02);
}

.tab-topline{background:linear-gradient(135deg,#dc2626,#b91c1c);}
.tab-subopt{background:linear-gradient(135deg,#f59e0b,#d97706);}
.tab-pmp{background:linear-gradient(135deg,#9333ea,#7e22ce);}
.tab-superv{background:linear-gradient(135deg,#059669,#047857);}
.tab-dqa{background:linear-gradient(135deg,#2563eb,#1d4ed8);}

/* DASHBOARD AREA: clip overflow */
.frame-wrap{
  flex:1;
  min-height:0;
  padding:18px 20px 20px;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  position:relative;
  z-index:1;
  overflow:hidden;
}

.aspect-ratio-box{
  width:100%;
  max-width:1600px;
  aspect-ratio:16 / 9;
  overflow:hidden;
  border-radius:18px;
  box-shadow:0 18px 45px rgba(0,0,0,.45);
  background:#fff;
}

.aspect-ratio-box iframe{
  width:100%;
  height:100%;
  border:0;
  background:#fff;
  display:block;
}
</style>
</head>

<body>

<header class="main-header">
  <div class="header-top">
    <a class="back-link" href="../../index.html">← Master Dashboard</a>
    <h1>Monitoring &amp; Evaluation (M&amp;E)</h1>
    <span class="header-year">FY2026</span>
  </div>

  <div class="header-tabs" role="tablist" aria-label="M&E dashboards">
    <!-- Order requested: Topline, Suboptimal, PMP, Supervision, DQA -->
    <div class="header-tab tab-topline active"
         data-src="./topline_indicator_performance.html" data-hash="topline">
      📈 Topline Performance (Key Indicators)
    </div>

    <div class="header-tab tab-subopt"
         data-src="./suboptimal_indicator_tracking.html" data-hash="suboptimal">
      ⚠ Suboptimal Tracking (Flags & Follow-up)
    </div>

    <div class="header-tab tab-pmp"
         data-src="./pmp.html" data-hash="pmp">
      📋 Performance Monitoring Plan (PMP)
    </div>

    <div class="header-tab tab-superv"
         data-src="./supervision_report.html" data-hash="supervision">
      🧭 Supportive Supervision (Site Reports)
    </div>

    <div class="header-tab tab-dqa"
         data-src="./dqa_report.html" data-hash="dqa">
      ✅ Data Quality Assessment (DQA)
    </div>
  </div>
</header>

<main class="frame-wrap">
  <div class="aspect-ratio-box">
    <!-- Default dashboard: Topline -->
    <iframe id="frame" src="./topline_indicator_performance.html" title="M&E dashboard"></iframe>
  </div>
</main>

<script>
const frame = document.getElementById("frame");
const tabs  = [...document.querySelectorAll(".header-tab")];

function activate(tab){
  tabs.forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  frame.src = tab.dataset.src;

  if(tab.dataset.hash){
    history.replaceState(null, "", "#" + tab.dataset.hash);
  }
}

tabs.forEach(tab => tab.addEventListener("click", () => activate(tab)));

const hash = location.hash.replace("#","").trim();
if(hash){
  const match = tabs.find(t => t.dataset.hash === hash);
  if(match) activate(match);
}
</script>

</body>
</html>
